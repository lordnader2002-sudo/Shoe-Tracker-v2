name: Sneaker Release Tracker

on:
  schedule:
    # Mondays and Fridays at 01:00 EST (06:00 UTC)
    - cron: '0 6 * * 1,5'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sneaker tracker
        run: python scraper.py

      - name: Commit and push reports + dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ docs/data/
          git diff --cached --quiet || git commit -m "chore: sneaker release update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
