name: Sneaker Release Tracker

on:
  schedule:
    # Every day at ~02:05 ET (06:05 UTC during EDT / 07:05 UTC during EST)
    # Offset from top-of-hour to avoid GitHub Actions scheduler congestion
    - cron: '5 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sneaker tracker
        run: python scraper.py

      - name: Commit and push reports + dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Always deploy data to the main branch so GitHub Pages updates,
          # even when this workflow is triggered from a feature branch.
          git fetch origin main
          git worktree add /tmp/deploy-tree origin/main

          # Copy only the generated data files (no code changes)
          cp -r reports/ /tmp/deploy-tree/
          mkdir -p /tmp/deploy-tree/docs/data
          cp docs/data/releases.json /tmp/deploy-tree/docs/data/releases.json
          [ -f docs/data/sneaker_releases.xlsx ] && \
            cp docs/data/sneaker_releases.xlsx /tmp/deploy-tree/docs/data/sneaker_releases.xlsx || true

          cd /tmp/deploy-tree
          git add reports/ docs/data/
          if git diff --cached --quiet; then
            echo "No data changes to deploy."
          else
            git commit -m "chore: sneaker release update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin HEAD:main
          fi
